esphome:
  name: energy-monitor-wemos

esp8266:
  board: d1_mini

# I2C is required for the BME280
i2c:
  sda: D2
  scl: D1
  scan: true

# TIC usually requires a specific baud rate from the Linky meter
uart:
  id: uart_bus
  tx_pin: D1 # Not used for TIC, but required by UART component
  rx_pin: D3 # Common pin for TIC (requires an optocoupler circuit!)
  baud_rate: 1200 # Standard Mode is 9600, Historical Mode is 1200
  stop_bits: 1
  data_bits: 7
  parity: EVEN

sensor:
  # 1. BME280 (I2C)
  - platform: bme280_i2c
    address: 0x76
    temperature:
      name: "BME280 Temperature"
    humidity:
      name: "BME280 Humidity"
    pressure:
      name: "BME280 Pressure"
    update_interval: 60s

  # 2. DHT22 (Digital D4)
  - platform: dht
    pin: D4
    model: DHT22
    temperature:
      name: "DHT22 External Temperature"
    humidity:
      name: "DHT22 External Humidity"
    update_interval: 60s

  # 3. Enedis TIC (Teleinfo)
  - platform: teleinfo
    uart_id: uart_bus
    tag: "PAPP" # Apparent Power (Historical Mode)
    name: "Consommation Actuelle"
    unit_of_measurement: "VA"
    icon: "mdi:flash"

  - platform: teleinfo
    uart_id: uart_bus
    tag: "BASE" # Total index (Historical Mode)
    name: "Index Total"
    unit_of_measurement: "Wh"
    icon: "mdi:counter"