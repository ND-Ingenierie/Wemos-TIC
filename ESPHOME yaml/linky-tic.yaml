esphome:
  name: linky-tic

esp8266:
  board: d1_mini

# GPIO3 (RX) réservé au TIC — logs UART désactivés
logger:
  baud_rate: 0

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Linky-TIC"     # AP de secours si connexion échoue

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret ota_password

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: false

# TIC Linky — mode historique : 1200 bauds, 7E1, RX = GPIO3
uart:
  id: tic_uart
  rx_pin: GPIO3
  baud_rate: 1200
  data_bits: 7
  parity: EVEN
  stop_bits: 1

teleinfo:
  id: tic
  uart_id: tic_uart
  historical_mode: true

sensor:

  - platform: bme280_i2c
    address: 0x76
    update_interval: 10s
    temperature:
      name: "Température"
      device_class: temperature
      state_class: measurement
      filters:
        - offset: -3.0
    humidity:
      name: "Humidité"
      device_class: humidity
      state_class: measurement
    pressure:
      name: "Pression"
      device_class: pressure
      state_class: measurement

  - platform: teleinfo
    tag_name: PAPP
    name: "Puissance apparente"
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    icon: "mdi:flash"

  - platform: teleinfo
    tag_name: IINST
    name: "Intensité instantanée"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    icon: "mdi:current-ac"

  - platform: teleinfo
    tag_name: IMAX
    name: "Intensité maximale"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    icon: "mdi:current-ac"

  # ISOUSC en kVA (formule TIC : intensité × 200 / 1000)
  - platform: teleinfo
    tag_name: ISOUSC
    name: "Puissance souscrite"
    unit_of_measurement: "kVA"
    accuracy_decimals: 1
    icon: "mdi:lightning-bolt"
    filters:
      - multiply: 0.2

  - platform: teleinfo
    tag_name: HCHC
    name: "Index Heures Creuses"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: HCHP
    name: "Index Heures Pleines"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: BASE
    name: "Index Base"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: BBRHCJB
    name: "Tempo HC Bleu"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: BBRHPJB
    name: "Tempo HP Bleu"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: BBRHCJW
    name: "Tempo HC Blanc"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: BBRHPJW
    name: "Tempo HP Blanc"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: BBRHCJR
    name: "Tempo HC Rouge"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: BBRHPJR
    name: "Tempo HP Rouge"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    icon: "mdi:counter"

  - platform: teleinfo
    tag_name: PEJP
    name: "Préavis EJP"
    unit_of_measurement: "min"
    icon: "mdi:clock-alert"

text_sensor:

  - platform: teleinfo
    tag_name: PTEC
    name: "Période tarifaire"
    icon: "mdi:calendar-clock"

  - platform: teleinfo
    tag_name: OPTARIF
    name: "Option tarifaire"
    icon: "mdi:tag"

  - platform: teleinfo
    tag_name: DEMAIN
    name: "Couleur demain (TEMPO)"
    icon: "mdi:weather-sunny"

  - platform: teleinfo
    tag_name: ADCO
    name: "N° compteur"
    icon: "mdi:identifier"

  - platform: teleinfo
    tag_name: HHPHC
    name: "Groupe HC"

  - platform: teleinfo
    tag_name: MOTDETAT
    name: "Mot d'état"
